version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vanopt-postgres
    environment:
      POSTGRES_DB: vanopt
      POSTGRES_USER: vanopt
      POSTGRES_PASSWORD: vanopt
    ports:
      - "5439:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: